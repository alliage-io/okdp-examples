# -- Container image configuration for the examples Job.
image:
  # -- OCI image repository for the examples container.
  repository: quay.io/okdp/okdp-examples
  # -- Kubernetes image pull policy.
  pullPolicy: Always
  # -- Image tag to use. Defaults are not inferred here; this value is explicit.
  tag: "latest"

# -- Image pull secrets for private registries.
imagePullSecrets: []

# -- Override the chart name.
nameOverride: ""

# -- Override the fully qualified release name.
fullnameOverride: ""

# -- Kubernetes Job configuration.
job:
  # -- Pod restart policy for the Job.
  restartPolicy: Never
  # -- Number of retries before the Job is considered failed.
  backoffLimit: 2
  # -- Annotations applied to the Job metadata, typically used for Helm hooks.
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": "before-hook-creation"

