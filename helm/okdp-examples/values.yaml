# -- ServiceAccount configuration for the Job pod.
serviceAccount:
  # -- Specifies whether a ServiceAccount should be created.
  create: true
  # -- Automatically mount the ServiceAccount token into the pod.
  automount: true
  # -- Additional annotations added to the ServiceAccount.
  annotations: {}
  # -- Name of the ServiceAccount to use. If empty and create=true, a name is generated.
  name: ""

# -- Additional annotations added to the pod template.
podAnnotations: {}

# -- Additional labels added to the pod template.
podLabels: {}

# -- Pod-level security context.
podSecurityContext: {}
# fsGroup: 2000

# -- Container-level security context.
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

# -- Resource requests and limits for the Job container.
resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
#   cpu: 100m
#   memory: 128Mi

# -- Additional volumes added to the Job pod.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# -- Additional volume mounts added to the Job container.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

# -- Node selector constraints for scheduling the Job pod.
nodeSelector: {}

# -- Tolerations for scheduling the Job pod onto tainted nodes.
tolerations: []

# -- Affinity rules for scheduling the Job pod.
affinity: {}
